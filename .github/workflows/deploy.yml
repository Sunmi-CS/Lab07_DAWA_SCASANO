name: Deploy to Render

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v3

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🚀 Disparar despliegue en Render
        # Este paso es opcional si ya conectaste Render directamente a GitHub, 
        # pero es excelente para cumplir con el requisito de "Workflow configurado".
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Llamando al Webhook de Render para desplegar..."
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
          else
            echo "No se encontró el secreto RENDER_DEPLOY_HOOK."
            echo "Se asume que Render está escuchando los cambios automáticamente."
          fi
